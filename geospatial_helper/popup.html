<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoSpatial Helper</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="w-[720px] bg-gray-50 p-5 font-sans">

  <header class="mb-3">
    <h1 class="text-lg font-bold text-gray-800 tracking-tight">GeoSpatial Helper</h1>
    <p class="text-xs text-gray-400 mt-0.5">Drop a file to inspect its features</p>
  </header>

  <!-- Drop zone (compact) -->
  <div
    id="drop-zone"
    class="flex items-center justify-center gap-3 border-2 border-dashed border-gray-300 rounded-xl py-4 cursor-pointer transition-all duration-150"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-300 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z" />
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M12 11v6m0 0l-2-2m2 2l2-2" />
    </svg>
    <div>
      <p class="text-sm font-medium text-gray-500">Drop a geospatial file here</p>
      <p class="text-xs text-gray-400">GeoJSON · KML · Shapefile (.shp + .dbf) · GeoParquet — or click to browse</p>
    </div>
  </div>

  <!-- Status banner -->
  <div id="status" class="hidden mt-3 text-sm px-3 py-2 rounded-lg border"></div>

  <!-- Basemap selector -->
  <div id="basemap-bar" class="flex items-center gap-2 mt-3">
    <label class="text-xs text-gray-500 font-medium shrink-0">Basemap:</label>
    <select id="basemap-select" class="text-xs border border-gray-300 rounded-md px-2 py-1 bg-white focus:outline-none focus:ring-2 focus:ring-blue-400">
      <option value="osm">OpenStreetMap</option>
      <option value="tomtom">TomTom</option>
    </select>
    <input
      id="tomtom-key-input"
      type="text"
      placeholder="TomTom API key…"
      class="hidden flex-1 text-xs px-2 py-1 border border-gray-300 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-400"
    />
  </div>

  <!-- Leaflet map — always rendered so the tile layer loads immediately -->
  <div id="map" style="height:260px" class="mt-3 rounded-lg overflow-hidden border border-gray-200 shadow-sm"></div>

  <!-- Search input (hidden until file loaded) -->
  <div id="search-container" class="hidden mt-4">
    <input
      id="search-input"
      type="text"
      placeholder="Search all fields..."
      class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
    />
  </div>

  <!-- Table output -->
  <div id="table-container" class="mt-3"></div>

  <script type="module" src="./popup.js"></script>
</body>
</html>
